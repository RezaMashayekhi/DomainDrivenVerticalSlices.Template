name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm NuGet package publish'
        required: true
        type: string

jobs:
  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'publish'

    steps:
      - uses: actions/checkout@v3
        name: Checkout code

      - uses: nuget/setup-nuget@v1
        name: Setup NuGet
        with:
          nuget-version: "6.x"

      - name: Install Mono
        run: sudo apt-get install -y mono-complete

      - name: Create the package
        run: nuget pack DomainDrivenVerticalSlices.Template.nuspec -NoDefaultExcludes

      - name: Publish the package
        run: nuget push RM.DomainDrivenVerticalSlices.Template.*.nupkg -Source 'https://api.nuget.org/v3/index.json' -ApiKey ${{secrets.NUGET_API_KEY}} -SkipDuplicate